<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydra Dashboard</title>

<style>
body {
  margin: 0;
  background: #020617;
  font-family: Arial;
  color: white;
}

/* MENU ICON */
.menu-icon {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 28px;
  cursor: pointer;
  z-index: 999;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: -250px;
  top: 0;
  width: 250px;
  height: 100%;
  background: #0f172a;
  padding: 20px;
  transition: 0.3s;
  z-index: 998;
}

.sidebar a {
  display: block;
  margin: 15px 0;
  color: white;
  text-decoration: none;
}

/* PAINEL */
#painel {
  padding: 20px;
}

/* TITULO */
#typing {
  text-align: center;
  font-size: 24px;
  margin-top: 40px;
}

/* BOTÕES */
.botoes {
  text-align: center;
  margin-top: 20px;
}

.botoes a {
  margin: 10px;
  padding: 10px 15px;
  background: #3b82f6;
  border-radius: 10px;
  text-decoration: none;
  color: white;
}

/* CARDS */
.card {
  margin: 20px;
  padding: 20px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 15px #3b82f6;
}

/* COMANDOS */
#comandos {
  display: none;
}

.categoria {
  margin: 20px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-left: 4px solid #22c55e;
}

.comando {
  display: flex;
  justify-content: space-between;
  background: rgba(255,255,255,0.05);
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
}

button {
  background: #22c55e;
  border: none;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="sidebar">
  <h2>Hydra</h2>
  <a href="#" onclick="abrirPainel()">🏠 Início</a>
  <a href="#" onclick="abrirComandos()">📜 Comandos</a>
</div>

<!-- PAINEL PRINCIPAL -->
<div id="painel">

  <div id="typing">Informações do Hydra</div>

  <div class="botoes">
    <a href="https://discord.com/oauth2/authorize?client_id=1487580689615552552&permissions=8&integration_type=0&scope=bot+applications.commands" target="_blank">
      🤖 Adicionar Bot
    </a>

    <a href="https://discord.gg/CTUE9asuT" target="_blank">
      💬 Suporte
    </a>
  </div>

  <div class="card">
    🔐 Sistema de Verificação — Proteja seu servidor contra raids.
  </div>

  <div class="card">
    🎫 Sistema de Tickets — Atendimento profissional.
  </div>

</div>

<!-- PÁGINA COMANDOS -->
<div id="comandos">

  <h2 style="text-align:center;">📜 Comandos</h2>

  <!-- CATEGORIA -->
  <div class="categoria">
    <h3>⚙️ Administração</h3>

    <div class="comando">
      <span>/say — Faz o bot falar</span>
      <button onclick="copiar('/say')">Copiar</button>
    </div>

    <div class="comando">
      <span>/ban — Banir usuário</span>
      <button onclick="copiar('/ban')">Copiar</button>
    </div>

  </div>

  <div class="categoria">
    <h3>🎮 Diversão</h3>

    <div class="comando">
      <span>/jogar — Jogar algo</span>
      <button onclick="copiar('/jogar')">Copiar</button>
    </div>

  </div>

</div>

<script>
function toggleMenu() {
  let menu = document.getElementById("sidebar");
  menu.style.left = menu.style.left === "0px" ? "-250px" : "0px";
}

function abrirComandos() {
  document.getElementById("painel").style.display = "none";
  document.getElementById("comandos").style.display = "block";
}

function abrirPainel() {
  document.getElementById("painel").style.display = "block";
  document.getElementById("comandos").style.display = "none";
}

function copiar(texto) {
  navigator.clipboard.writeText(texto);
  alert("Comando copiado: " + texto);
}
</script>

</body>
</html>
